<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unidade Técnica de Gestão do Saneamento de Luanda</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#010210;color:white;}
#bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;transition:1s;}
.glass{background:rgba(255,255,255,0.06);backdrop-filter:blur(18px);border-radius:18px;padding:20px;border:1px solid rgba(255,255,255,0.08);margin-bottom:10px;transition:0.3s;}
.glass:hover{transform:translateY(-6px) scale(1.02);}
.sidebar{width:260px;backdrop-filter:blur(20px);min-height:100vh;}
.nav-btn{padding:12px;border-radius:12px;transition:0.3s;cursor:pointer;text-align:left;}
.nav-btn:hover{background:rgba(255,255,255,0.08);transform:translateX(5px);}
.active{background:linear-gradient(90deg,#10b98133,#10b98111);}
.fade{animation:fadeIn 0.5s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
#map{height:400px;border-radius:18px;}
#chat{position:fixed;bottom:10px;right:10px;width:72;backdrop-filter:blur(15px);border-radius:18px;padding:10px;z-index:10;background:rgba(255,255,255,0.06);}
#chatBox{height:150px;overflow-y:auto;margin-bottom:5px;font-size:0.8rem;}
h1.gradient-title{font-size:2.8rem;font-weight:900;background:linear-gradient(90deg,#10b981,#3b82f6,#facc15);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:2px 2px 5px rgba(0,0,0,0.4);}
@media(max-width:768px){.sidebar{width:100%;position:fixed;bottom:0;left:0;display:flex;justify-content:space-around;padding:10px;z-index:10;}.nav-btn{padding:6px;font-size:0.7rem;}h1.gradient-title{font-size:1.8rem;}}
</style>
</head>
<body class="flex flex-col md:flex-row">

<div id="bg"></div>

<!-- SIDEBAR -->
<div class="sidebar p-4 flex flex-col gap-2 relative z-10">
<h2 class="text-xl font-bold mb-4">UTGSL Call Center</h2>
<div class="nav-btn active" onclick="nav('home',this)">Home</div>
<div class="nav-btn" onclick="nav('report',this)">Reportar Problema</div>
<div class="nav-btn" onclick="nav('clients',this)">Clientes</div>
<div class="nav-btn" onclick="nav('staff',this)">Equipa / Staff</div>
<div class="nav-btn" onclick="nav('dashboard',this)">Dashboard Agente</div>
<div class="nav-btn" onclick="nav('map',this)">Mapa</div>
<div class="nav-btn" onclick="nav('feedback',this)">Feedback</div>
<div class="nav-btn" onclick="nav('notifications',this)">Notificações</div>
<div class="mt-auto text-xs text-gray-400">Powered by Magestade Pura Digital</div>
</div>

<!-- MAIN CONTENT -->
<div class="flex-1 p-6 overflow-y-auto relative z-10">
<div id="content"></div>
</div>

<!-- CHATBOT -->
<div id="chat">
<div class="text-sm mb-1">Assistente Virtual</div>
<div id="chatBox"></div>
<input id="chatInput" placeholder="Escreva..." class="w-full p-2 text-black rounded" onkeydown="if(event.key==='Enter') sendMsg()">
</div>

<script>
// BACKGROUND ROTATIVO
const imgs=[
"https://images.unsplash.com/photo-1581578731548-c64695cc6952",
"https://images.unsplash.com/photo-1604187351574-c75ca79f5807",
"https://images.unsplash.com/photo-1501004318641-b39e6451bec6"
];
let i=0;
function bg(){document.getElementById("bg").style.background=`linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),url(${imgs[i]}) center/cover fixed`; i=(i+1)%imgs.length;}
setInterval(bg,7000); bg();

// DATABASE DUMMY
let DB=JSON.parse(localStorage.getItem("utgsl")||`{"clients":[{"name":"Mateus João","type":"Individual","address":"Rua da Missão, Maianga","phone":"921111111","status":"Ativo","financial":"Regular"}],"staff":[{"name":"Kapenda","role":"Diretor Geral","msg":"Estamos comprometidos com a transformação digital e o saneamento de Luanda."},{"name":"Alberto Marcos","role":"Operações"},{"name":"Jenny Baptista","role":"Atendimento"}],"complaints":[],"feedback":[{"name":"Cidadão 1","msg":"Adoro a rapidez do atendimento!"},{"name":"Cidadão 2","msg":"Sistema muito intuitivo!"}],"notifications":[{"msg":"Sistema atualizado hoje"}]}`);
function save(){localStorage.setItem("utgsl",JSON.stringify(DB));}

// NAVIGATION
function nav(page,el){
document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
switch(page){
case"home":renderHome();break;
case"report":renderReport();break;
case"clients":renderClients();break;
case"staff":renderStaff();break;
case"dashboard":renderDashboard();break;
case"map":renderMap();break;
case"feedback":renderFeedback();break;
case"notifications":renderNotifications();break;
}
}

// RENDER FUNCTIONS
function renderHome(){
content.innerHTML=`<div class="fade">
<h1 class="gradient-title">Unidade Técnica de Gestão do Saneamento de Luanda</h1>
<p class="text-gray-300 mt-2 text-lg">Acompanhe ocorrências de saneamento, reporte problemas e aceda a informações importantes.</p>
<div class="grid md:grid-cols-3 gap-4 mt-4">
<div class="glass"><b>Total Clientes</b><p>${DB.clients.length}</p></div>
<div class="glass"><b>Ocorrências</b><p>${DB.complaints.length}</p></div>
<div class="glass"><b>Feedback</b><p>${DB.feedback.length}</p></div>
</div>
</div>`;
}

function renderReport(){
content.innerHTML=`<div class="fade">
<h2 class="text-xl font-semibold text-yellow-400">Reportar Problema de Saneamento</h2>
<select id="rType" class="p-2 w-full mb-2 text-black">
<option>Fuga de água</option>
<option>Entupimento de esgoto</option>
<option>Lixo acumulado</option>
<option>Drenagem bloqueada</option>
<option>Inundação</option>
</select>
<input id="rLocation" placeholder="Localização (Bairro)" class="p-2 w-full mb-2 text-black">
<textarea id="rMsg" placeholder="Descrição do problema" class="p-2 w-full mb-2 text-black"></textarea>
<input id="rPhone" placeholder="Telefone / Nome" class="p-2 w-full mb-2 text-black">
<button onclick="addComplaint()" class="bg-green-600 p-2 w-full rounded">Submeter</button>
<div class="mt-4">${DB.complaints.map(c=>`<div class="glass fade"><b>${c.name}</b> (${c.type})<br>${c.msg}<br>Bairro: ${c.location}<br>Status: ${c.status || "Recebido"}</div>`).join("")}</div>
</div>`;
}

function addComplaint(){
let name=document.getElementById("rPhone").value,type=document.getElementById("rType").value,msg=document.getElementById("rMsg").value,loc=document.getElementById("rLocation").value;
if(!name||!msg||!loc){alert("Preencha todos os campos."); return;}
DB.complaints.push({name,type,msg,location:loc,status:"Recebido"});save();renderReport();
}

function renderClients(){
content.innerHTML=`<div class="fade">
<h2 class="text-xl font-semibold text-cyan-400">Clientes / Utentes</h2>
${DB.clients.map(c=>`<div class="glass fade"><b>${c.name}</b><br>Tipo: ${c.type}<br>Morada: ${c.address}<br>Telefone: ${c.phone}<br>Status: ${c.status}<br>Estado Financeiro: ${c.financial}</div>`).join("")}
</div>`;
}

function renderStaff(){
content.innerHTML=`<div class="fade">
<h2 class="text-xl font-semibold text-purple-400">Equipa / Staff</h2>
<div class="grid md:grid-cols-3 gap-4 mt-4">
${DB.staff.map(s=>`<div class="glass fade"><b>${s.name}</b><p>${s.role}</p>${s.msg?'<p>"'+s.msg+'"</p>':''}</div>`).join("")}
</div>
</div>`;
}

function renderDashboard(){
content.innerHTML=`<div class="fade">
<h2 class="text-xl font-semibold text-green-400">Dashboard do Agente</h2>
<div class="grid md:grid-cols-3 gap-4">
<div class="glass">Clientes: ${DB.clients.length}</div>
<div class="glass">Ocorrências: ${DB.complaints.length}</div>
<div class="glass">Feedback: ${DB.feedback.length}</div>
</div>
<div class="glass mt-4"><canvas id="chart"></canvas></div>
</div>`;
new Chart(document.getElementById("chart"),{type:"bar",data:{labels:["Seg","Ter","Qua","Qui","Sex"],datasets:[{label:"Ocorrências",data:[12,19,7,15,10],backgroundColor:"#10b981"}]}});
}

function renderMap(){
content.innerHTML=`<div id="map"></div>`;
const map=L.map('map').setView([-8.83,13.23],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
[[-8.83,13.23,"Centro"],[-8.90,13.18,"Talatona"],[-8.84,13.25,"Maianga"]].forEach(p=>L.marker([p[0],p[1]]).addTo(map).bindPopup(p[2]));
}

function renderFeedback(){
content.innerHTML=`<div class="fade">
<h2 class="text-xl font-semibold text-pink-400">Feedback dos Munícipes</h2>
${DB.feedback.map(f=>`<div class="glass fade"><b>${f.name}</b>: ${f.msg}</div>`).join("")}
</div>`;
}

function renderNotifications(){
content.innerHTML=`<div class="fade">
<h2 class="text-xl font-semibold text-orange-400">Notificações</h2>
${DB.notifications.map(n=>`<div class="glass fade">${n.msg}</div>`).join("")}
</div>`;
}

// CHATBOT
function sendMsg(){
let v=chatInput.value;if(!v) return;
chatBox.innerHTML+=`<div>> ${v}</div>`;
let r="Consulte o dashboard.";
if(v.includes("cliente")) r="Abra Clientes.";
if(v.includes("reclama")) r="Abra Reportar Problema.";
if(v.includes("staff")) r="Abra Equipa / Staff.";
setTimeout(()=>{chatBox.innerHTML+=`<div class="text-green-400">${r}</div>`;chatBox.scrollTop=chatBox.scrollHeight;},400);
chatInput.value="";
}

// INIT
nav('home',document.querySelector(".nav-btn"));
</script>
</body>
  </html>
