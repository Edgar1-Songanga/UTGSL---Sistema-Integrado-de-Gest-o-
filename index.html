<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unidade Técnica de Gestão do Saneamento de Luanda</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; background:#020617; color:white; font-family:system-ui; }

#bg {
  position:fixed;
  inset:0;
  z-index:0;
  transition:1s;
}

.glass {
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(18px);
  border-radius:18px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}
.glass:hover { transform:translateY(-4px); }

.sidebar {
  width:260px;
  backdrop-filter:blur(20px);
}

.nav-btn {
  padding:12px;
  border-radius:12px;
  transition:0.3s;
}
.nav-btn:hover {
  background:rgba(255,255,255,0.08);
  transform:translateX(5px);
}
.active {
  background:linear-gradient(90deg,#10b98133,#10b98111);
}

.fade { animation:fadeIn 0.5s ease; }
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

.hero {
  background:linear-gradient(to right, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
}

#map { height:420px; }
</style>
</head>

<body class="flex">

<div id="bg"></div>

<!-- SIDEBAR -->
<div class="sidebar p-4 flex flex-col gap-2 relative z-10">
<h2 class="text-xl font-bold mb-4">UTGSL</h2>

<button class="nav-btn active" onclick="nav('dashboard',this)">Dashboard</button>
<button class="nav-btn" onclick="nav('clients',this)">Clientes</button>
<button class="nav-btn" onclick="nav('complaints',this)">Reclamações</button>
<button class="nav-btn" onclick="nav('map',this)">Mapa</button>
<button class="nav-btn" onclick="nav('feedback',this)">Feedback</button>
<button class="nav-btn" onclick="nav('institutional',this)">Institucional</button>

<div class="mt-auto text-xs text-gray-400">
Powered by Magestade Pura Digital
</div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col relative z-10">

<!-- HERO -->
<div class="hero p-8 border-b border-white/10">

<h1 class="text-3xl md:text-5xl font-bold">
Unidade Técnica de Gestão do Saneamento de Luanda
</h1>

<p class="text-gray-300 mt-2 max-w-2xl">
Plataforma Digital Inteligente para Gestão de Saneamento Urbano em Tempo Real
</p>

<div class="mt-4 flex flex-wrap gap-4 text-sm text-gray-400">
<span>Director: Kapenda</span>
<span>Operações: Alberto Marcos</span>
<span>Atendimento: Jenny Baptista</span>
</div>

</div>

<!-- CONTENT -->
<div id="content" class="p-6 overflow-y-auto"></div>

</div>

<!-- CHATBOT -->
<div id="chat" class="fixed bottom-4 right-4 w-72 glass z-10">
<div class="text-sm mb-2">Assistente Virtual</div>
<div id="chatBox" class="h-40 overflow-y-auto text-xs mb-2"></div>
<input id="chatInput" placeholder="Escreva..." 
class="w-full p-2 text-black rounded"
onkeydown="if(event.key==='Enter') sendMsg()">
</div>

<script>

// BACKGROUND ROTATION
const imgs=[
"https://images.unsplash.com/photo-1581578731548-c64695cc6952",
"https://images.unsplash.com/photo-1604187351574-c75ca79f5807",
"https://images.unsplash.com/photo-1501004318641-b39e6451bec6"
];

let i=0;
function bg(){
document.getElementById("bg").style.background=
`linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),url(${imgs[i]}) center/cover fixed`;
i=(i+1)%imgs.length;
}
setInterval(bg,7000); bg();

// DATABASE
let DB = JSON.parse(localStorage.getItem("utgsl") || '{"clients":[],"complaints":[]}');
function save(){ localStorage.setItem("utgsl",JSON.stringify(DB)); }

// NAV
function nav(page,el){
document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");

if(page==="dashboard") renderDashboard();
if(page==="clients") renderClients();
if(page==="complaints") renderComplaints();
if(page==="map") renderMap();
if(page==="feedback") renderFeedback();
if(page==="institutional") renderInstitutional();
}

// DASHBOARD
function renderDashboard(){
content.innerHTML=`<div class="fade">

<div class="grid md:grid-cols-4 gap-6">
<div class="glass"><p>Clientes</p><h2>${DB.clients.length}</h2></div>
<div class="glass"><p>Reclamações</p><h2>${DB.complaints.length}</h2></div>
<div class="glass"><p>Resolvidas</p><h2>12</h2></div>
<div class="glass"><p>Status</p><h2>Operacional</h2></div>
</div>

<div class="glass mt-6"><canvas id="chart"></canvas></div>

</div>`;

new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:["Seg","Ter","Qua","Qui","Sex"],datasets:[{data:[12,19,7,15,10]}]}
});
}

// CLIENTS
function renderClients(){
content.innerHTML=`<div class="fade">
<h2>Clientes</h2>

<input id="name" placeholder="Nome" class="p-2 w-full mb-2 text-black">
<input id="phone" placeholder="Telefone" class="p-2 w-full mb-2 text-black">
<input id="address" placeholder="Morada" class="p-2 w-full mb-2 text-black">

<select id="status" class="p-2 w-full mb-2 text-black">
<option>Regular</option><option>Dívida</option>
</select>

<button onclick="addClient()" class="bg-green-600 p-2 w-full">Guardar</button>

<div class="mt-4">
${DB.clients.map(c=>`<div class="glass mt-2">
<b>${c.name}</b><br>
${c.phone}<br>${c.address}<br>
<span class="${c.status==='Regular'?'text-green-400':'text-red-400'}">${c.status}</span>
</div>`).join("")}
</div>
</div>`;
}

function addClient(){
DB.clients.push({
name:name.value,
phone:phone.value,
address:address.value,
status:status.value
});
save(); renderClients();
}

// COMPLAINTS
function renderComplaints(){
content.innerHTML=`<div class="fade">
<h2>Reclamações</h2>

<input id="complaintName" placeholder="Nome" class="p-2 w-full mb-2 text-black">
<textarea id="msg" placeholder="Mensagem" class="p-2 w-full mb-2 text-black"></textarea>

<select id="type" class="p-2 w-full mb-2 text-black">
<option>Lixo</option><option>Esgoto</option>
</select>

<button onclick="addComplaint()" class="bg-green-600 p-2 w-full">Enviar</button>

<div class="mt-4">
${DB.complaints.map(c=>`<div class="glass mt-2">
<b>${c.name}</b> (${c.type})<br>${c.msg}
</div>`).join("")}
</div>
</div>`;
}

function addComplaint(){
DB.complaints.push({
name:complaintName.value,
msg:msg.value,
type:type.value
});
save(); renderComplaints();
}

// MAP
function renderMap(){
content.innerHTML=`<div id="map"></div>`;
const map=L.map('map').setView([-8.83,13.23],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

[
[-8.83,13.23,"Centro"],
[-8.90,13.18,"Talatona"],
[-8.84,13.25,"Maianga"]
].forEach(p=>L.marker([p[0],p[1]]).addTo(map).bindPopup(p[2]));
}

// FEEDBACK
function renderFeedback(){
content.innerHTML=`<div class="fade">
<div class="glass">Sistema moderno e eficiente</div>
<div class="glass mt-2">Facilitou o saneamento</div>
</div>`;
}

// INSTITUTIONAL
function renderInstitutional(){
content.innerHTML=`<div class="fade">
<div class="glass">
<h2>Mensagem do Director</h2>
<p>Estamos comprometidos com a transformação digital.</p>
</div>

<div class="grid md:grid-cols-3 gap-4 mt-4">
<div class="glass"><b>Missão</b><p>Eficiência</p></div>
<div class="glass"><b>Visão</b><p>Liderança</p></div>
<div class="glass"><b>Valores</b><p>Transparência</p></div>
</div>

<div class="mt-6 grid md:grid-cols-3 gap-4">
<div class="glass"><b>Kapenda</b><p>Director</p></div>
<div class="glass"><b>Alberto Marcos</b><p>Operações</p></div>
<div class="glass"><b>Jenny Baptista</b><p>Atendimento</p></div>
</div>
</div>`;
}

// CHATBOT
function sendMsg(){
let v=chatInput.value;
if(!v) return;
chatBox.innerHTML+=`<div>> ${v}</div>`;

let r="Consulte o dashboard.";
if(v.includes("cliente")) r="Abra Clientes.";
if(v.includes("reclama")) r="Abra Reclamações.";

setTimeout(()=>{
chatBox.innerHTML+=`<div class="text-green-400">${r}</div>`;
chatBox.scrollTop=chatBox.scrollHeight;
},400);

chatInput.value="";
}

// INIT
renderDashboard();

</script>

</body>
  </html>‎
