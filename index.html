<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UTGSL Smart City V7</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { background:#0b0f19; color:white; font-family:system-ui; }
.glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(12px); border-radius:14px; padding:16px; }
.sidebar { width:260px; background:#0f172a; }
.hidden { display:none; }
</style>
</head>

<body class="flex h-screen">

<!-- LOGIN -->
<div id="loginScreen" class="flex items-center justify-center w-full">
<div class="glass w-96 text-center">
<h2 class="text-xl mb-4">Sistema UTGSL</h2>
<input id="user" placeholder="Nome" class="w-full p-2 mb-2">
<select id="role" class="w-full p-2 mb-2">
<option value="admin">Admin</option>
<option value="operador">Operador</option>
</select>
<button onclick="Auth.login()" class="bg-green-500 w-full p-2">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden flex w-full">

<!-- SIDEBAR -->
<div class="sidebar p-4 space-y-2">
<h2 class="text-xl font-bold">UTGSL</h2>

<button onclick="Router.go('dashboard')">Dashboard</button>
<button onclick="Router.go('map')">Mapa</button>
<button onclick="Router.go('clients')">Clientes</button>
<button onclick="Router.go('complaints')">Reclamações</button>

<hr>
<div id="userInfo"></div>
<button onclick="Auth.logout()" class="text-red-400">Sair</button>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<div class="p-4 bg-black flex justify-between">
<h1>Unidade Técnica de Gestão do Saneamento de Luanda</h1>
<div>Smart City Platform</div>
</div>

<div class="p-6 overflow-y-auto flex-1">

<!-- DASHBOARD -->
<div id="dashboard"></div>

<!-- MAP -->
<div id="mapView" class="hidden">
<div id="map" style="height:500px;"></div>
</div>

<!-- CLIENTES -->
<div id="clients" class="hidden"></div>

<!-- RECLAMAÇÕES -->
<div id="complaints" class="hidden"></div>

</div>
</div>
</div>

<!-- CHAT -->
<div class="fixed bottom-4 right-4 w-80 glass">
<div id="chatBox" class="h-40 overflow-y-auto"></div>
<input id="chatInput" class="w-full p-2">
<button onclick="Chat.send()" class="bg-green-500 w-full p-2">Enviar</button>
</div>

<script>

/* ================= STATE ================= */
const Store = {
state: {
user:null,
clients:[],
complaints:[]
},
listeners:[],
subscribe(fn){ this.listeners.push(fn); },
setState(newState){
this.state = {...this.state, ...newState};
this.listeners.forEach(fn=>fn(this.state));
localStorage.setItem("db", JSON.stringify(this.state));
},
init(){
const data = JSON.parse(localStorage.getItem("db"));
if(data) this.state = data;
}
};

/* ================= AUTH ================= */
const Auth = {
login(){
Store.setState({
user:{name:user.value, role:role.value}
});
loginScreen.classList.add("hidden");
app.classList.remove("hidden");
userInfo.innerHTML = user.value + " ("+role.value+")";
Router.go("dashboard");
},
logout(){ location.reload(); }
};

/* ================= ROUTER ================= */
const Router = {
go(view){
document.querySelectorAll("#dashboard,#mapView,#clients,#complaints")
.forEach(v=>v.classList.add("hidden"));

document.getElementById(view==="map"?"mapView":view).classList.remove("hidden");

Render[view]();
}
};

/* ================= API ================= */
const API = {
delay(ms){ return new Promise(r=>setTimeout(r,ms)); },

async addClient(data){
await this.delay(400);

Store.setState({
clients:[...Store.state.clients, data]
});
},

async addComplaint(data){
await this.delay(400);

Store.setState({
complaints:[...Store.state.complaints, data]
});
}
};

/* ================= RENDER ================= */
const Render = {

dashboard(){
dashboard.innerHTML = `
<div class="grid grid-cols-3 gap-4">
<div class="glass">Clientes: ${Store.state.clients.length}</div>
<div class="glass">Reclamações: ${Store.state.complaints.length}</div>
<div class="glass">Utilizador: ${Store.state.user.role}</div>
</div>

<canvas id="chart"></canvas>
`;

new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:["Jan","Fev","Mar"],
datasets:[{data:[5,8,3]}]}
});
},

clients(){
clients.innerHTML = `
<input id="cName" placeholder="Nome" class="p-2 w-full mb-2">
<button onclick="Actions.addClient()" class="bg-green-500 w-full p-2">Adicionar</button>
<div id="list"></div>
`;

let html="";
Store.state.clients.forEach(c=>{
html+=`<div class="glass mt-2">${c.name}</div>`;
});
document.getElementById("list").innerHTML=html;
},

complaints(){
complaints.innerHTML = `
<input id="rMsg" placeholder="Mensagem" class="p-2 w-full mb-2">
<button onclick="Actions.addComplaint()" class="bg-green-500 w-full p-2">Enviar</button>
<div id="listC"></div>
`;

let html="";
Store.state.complaints.forEach(c=>{
html+=`<div class="glass mt-2">${c.msg}</div>`;
});
document.getElementById("listC").innerHTML=html;
}

};

/* ================= ACTIONS ================= */
const Actions = {

addClient(){
API.addClient({
id:crypto.randomUUID(),
name:cName.value
});
},

addComplaint(){
API.addComplaint({
id:crypto.randomUUID(),
msg:rMsg.value
});
}
};

/* ================= MAP ================= */
const map = L.map('map').setView([-8.83,13.23],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* ================= CHAT ================= */
const Chat = {
send(){
let msg = chatInput.value;
if(!msg) return;

chatBox.innerHTML += `<div class="text-green-400">${msg}</div>`;

let res = "A processar...";

if(msg.includes("cliente")) res="Ver módulo clientes";
if(msg.includes("lixo")) res="Equipa enviada";

setTimeout(()=>{
chatBox.innerHTML += `<div>${res}</div>`;
chatBox.scrollTop = chatBox.scrollHeight;
},500);

chatInput.value="";
}
};

/* ================= INIT ================= */
Store.init();

</script>

</body>
</html>
