<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTGSL | Gestão de Saneamento Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #010210;
            color: white;
            overflow-x: hidden;
        }

        #bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-size: cover;
            background-position: center;
            transition: 1s ease-in-out;
            filter: brightness(0.6);
        }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 10px;
            transition: all 0.3s ease-in-out;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .glass:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }

        .sidebar {
            width: 280px;
            backdrop-filter: blur(25px);
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.3);
        }

        .nav-btn {
            padding: 14px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: left;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            transform: translateX(3px);
        }

        .nav-btn.active {
            background: linear-gradient(90deg, #10b98133, #10b98111);
            color: #10b981;
            border-left: 3px solid #10b981;
            padding-left: 17px;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #map {
            height: 450px;
            border-radius: 18px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        #chat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        #chatBox {
            height: 180px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
        }

        #chatInput {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            outline: none;
        }

        #chatInput::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        h1.gradient-title {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #10b981, #3b82f6, #facc15);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            line-height: 1.1;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .form-input,
        .form-textarea,
        .form-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            outline: none;
            width: 100%;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3);
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn-primary {
            background: linear-gradient(90deg, #10b981, #3b82f6);
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: fixed;
                bottom: 0;
                left: 0;
                display: flex;
                justify-content: space-around;
                padding: 10px 0;
                z-index: 10;
                min-height: auto;
                border-right: none;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                background: rgba(0, 0, 0, 0.7);
            }

            .nav-btn {
                padding: 8px;
                font-size: 0.75rem;
                flex-direction: column;
                text-align: center;
                gap: 5px;
            }

            .nav-btn.active {
                border-left: none;
                border-bottom: 3px solid #10b981;
                padding-left: 8px;
            }

            h1.gradient-title {
                font-size: 2.2rem;
            }

            #chat {
                width: calc(100% - 40px);
                left: 20px;
                right: 20px;
                bottom: 80px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="flex flex-col md:flex-row">

    <div id="bg"></div>

    <!-- SIDEBAR -->
    <div class="sidebar flex flex-col gap-2 relative z-10">
        <h2 class="text-3xl font-extrabold mb-6 text-white text-center">UTGSL <span class="text-green-500">.</span></h2>
        <div class="nav-btn active" onclick="nav('home',this)"><i class="fas fa-home"></i> Home</div>
        <div class="nav-btn" onclick="nav('report',this)"><i class="fas fa-exclamation-triangle"></i> Reportar Problema</div>
        <div class="nav-btn" onclick="nav('clients',this)"><i class="fas fa-users"></i> Clientes</div>
        <div class="nav-btn" onclick="nav('staff',this)"><i class="fas fa-user-tie"></i> Equipa / Staff</div>
        <div class="nav-btn" onclick="nav('dashboard',this)"><i class="fas fa-chart-line"></i> Dashboard Agente</div>
        <div class="nav-btn" onclick="nav('map',this)"><i class="fas fa-map-marked-alt"></i> Mapa</div>
        <div class="nav-btn" onclick="nav('feedback',this)"><i class="fas fa-comment-alt"></i> Feedback</div>
        <div class="nav-btn" onclick="nav('notifications',this)"><i class="fas fa-bell"></i> Notificações</div>
        <div class="mt-auto text-xs text-gray-500 text-center pt-4">Powered by <span class="font-semibold text-gray-400">Magestade Pura Digital</span></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 p-6 md:p-10 overflow-y-auto relative z-10">
        <div id="content"></div>
    </div>

    <!-- CHATBOT -->
    <div id="chat">
        <div class="text-lg font-semibold mb-2 text-white">Assistente Virtual</div>
        <div id="chatBox"></div>
        <input id="chatInput" placeholder="Escreva a sua mensagem..." class="form-input w-full" onkeydown="if(event.key==='Enter') sendMsg()">
    </div>

    <script>
        // BACKGROUND ROTATIVO
        const imgs = [
            "https://images.unsplash.com/photo-1581578731548-c64695cc6952?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
            "https://images.unsplash.com/photo-1604187351574-c75ca79f5807?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
            "https://images.unsplash.com/photo-1501004318641-b39e6451bec6?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        ];
        let i = 0;
        function bg() {
            document.getElementById("bg").style.background = `linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),url(${imgs[i]}) center/cover fixed`;
            i = (i + 1) % imgs.length;
        }
        setInterval(bg, 7000); 
        bg(); // Initial call

        // DATABASE DUMMY
        let DB = JSON.parse(localStorage.getItem("utgsl") || `{"clients":[{"name":"Mateus João","type":"Individual","address":"Rua da Missão, Maianga","phone":"921111111","status":"Ativo","financial":"Regular"},{"name":"Ana Silva","type":"Empresarial","address":"Av. Deolinda Rodrigues, Viana","phone":"933222111","status":"Inativo","financial":"Atrasado"}],"staff":[{"name":"Kapenda","role":"Diretor Geral","msg":"Na UTGSL, estamos a redefinir o futuro do saneamento em Luanda. A nossa visão é impulsionar a inovação e a sustentabilidade, garantindo um ambiente mais saudável e próspero para todos os cidadãos. Juntos, construímos um legado de excelência e compromisso com a comunidade.","img":"https://randomuser.me/api/portraits/men/32.jpg"},{"name":"Alberto Marcos","role":"Coordenador de Operações","msg":"A eficiência operacional é a nossa prioridade. Trabalhamos incansavelmente para otimizar processos e garantir que cada intervenção seja rápida e eficaz.","img":"https://randomuser.me/api/portraits/men/44.jpg"},{"name":"Jenny Baptista","role":"Gestora de Atendimento ao Cliente","msg":"A voz do nosso cliente é o nosso guia. Dedicamo-nos a oferecer um atendimento de excelência, transformando cada interação numa oportunidade para superar expectativas.","img":"https://randomuser.me/api/portraits/women/67.jpg"},{"name":"Carlos Mendes","role":"Engenheiro Ambiental","msg":"Com paixão pela sustentabilidade, implementamos soluções inovadoras que protegem o nosso ecossistema e promovem a saúde pública.","img":"https://randomuser.me/api/portraits/men/78.jpg"}],"complaints":[{"name":"João Pedro","type":"Fuga de água","msg":"Fuga intensa na rua principal, causando alagamento.","location":"Benfica","status":"Em Análise"}],"feedback":[{"name":"Cidadão 1","msg":"Adoro a rapidez do atendimento!"},{"name":"Cidadão 2","msg":"Sistema muito intuitivo!"},{"name":"Maria Lúcia","msg":"Excelente iniciativa! Facilita muito o reporte de problemas."}] ,"notifications":[{"msg":"Sistema atualizado hoje com novas funcionalidades de mapeamento."},{"msg":"Equipa de intervenção rápida mobilizada para a área de Viana."}]}`);
        function save() {
            localStorage.setItem("utgsl", JSON.stringify(DB));
        }

        // NAVIGATION
        function nav(page, el) {
            document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
            el.classList.add("active");
            const contentDiv = document.getElementById("content");
            contentDiv.classList.remove('fade-in'); // Reset animation
            void contentDiv.offsetWidth; // Trigger reflow
            contentDiv.classList.add('fade-in'); // Add animation

            switch (page) {
                case "home": renderHome(); break;
                case "report": renderReport(); break;
                case "clients": renderClients(); break;
                case "staff": renderStaff(); break;
                case "dashboard": renderDashboard(); break;
                case "map": renderMap(); break;
                case "feedback": renderFeedback(); break;
                case "notifications": renderNotifications(); break;
            }
        }

        // RENDER FUNCTIONS
        function renderHome() {
            content.innerHTML = `
                <div class="fade-in">
                    <h1 class="gradient-title mb-4">Unidade Técnica de Gestão do Saneamento de Luanda</h1>
                    <p class="text-gray-300 text-xl mb-8 max-w-3xl">Acompanhe ocorrências de saneamento, reporte problemas e aceda a informações importantes com uma interface intuitiva e moderna.</p>
                    <div class="card-grid">
                        <div class="glass flex items-center gap-4">
                            <i class="fas fa-users text-4xl text-blue-400"></i>
                            <div>
                                <b class="text-gray-300">Total Clientes</b>
                                <p class="text-3xl font-bold text-white">${DB.clients.length}</p>
                            </div>
                        </div>
                        <div class="glass flex items-center gap-4">
                            <i class="fas fa-exclamation-triangle text-4xl text-yellow-400"></i>
                            <div>
                                <b class="text-gray-300">Ocorrências Reportadas</b>
                                <p class="text-3xl font-bold text-white">${DB.complaints.length}</p>
                            </div>
                        </div>
                        <div class="glass flex items-center gap-4">
                            <i class="fas fa-comment-alt text-4xl text-pink-400"></i>
                            <div>
                                <b class="text-gray-300">Feedback Recebido</b>
                                <p class="text-3xl font-bold text-white">${DB.feedback.length}</p>
                            </div>
                        </div>
                    </div>
                    <div class="glass mt-8 p-6">
                        <h3 class="text-2xl font-bold mb-4 text-green-400">Bem-vindo à Plataforma UTGSL</h3>
                        <p class="text-gray-300 leading-relaxed">A Unidade Técnica de Gestão do Saneamento de Luanda (UTGSL) está empenhada em modernizar e otimizar os serviços de saneamento básico na capital. Através desta plataforma, cidadãos e equipas operacionais podem colaborar de forma eficiente para garantir um ambiente mais limpo e saudável. Explore as funcionalidades, reporte problemas e acompanhe o progresso das nossas iniciativas.</p>
                    </div>
                </div>`;
        }

        function renderReport() {
            content.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-4xl font-extrabold text-yellow-400 mb-6">Reportar Problema de Saneamento</h2>
                    <p class="text-gray-400 mb-6">Por favor, preencha os detalhes abaixo para nos ajudar a resolver o problema rapidamente.</p>
                    <div class="glass p-6 space-y-4">
                        <select id="rType" class="form-select">
                            <option value="">Selecione o Tipo de Problema</option>
                            <option>Fuga de água</option>
                            <option>Entupimento de esgoto</option>
                            <option>Lixo acumulado</option>
                            <option>Drenagem bloqueada</option>
                            <option>Inundação</option>
                            <option>Outro</option>
                        </select>
                        <input id="rLocation" placeholder="Localização (Ex: Bairro Talatona, Rua Principal)" class="form-input">
                        <textarea id="rMsg" placeholder="Descrição detalhada do problema (Ex: Fuga intensa, cheiro forte, etc.)" class="form-textarea"></textarea>
                        <input id="rPhone" placeholder="Seu Nome / Telefone (Opcional)" class="form-input">
                        <button onclick="addComplaint()" class="btn-primary w-full">Submeter Relatório</button>
                    </div>
                    <div class="mt-8">
                        <h3 class="text-2xl font-bold mb-4 text-yellow-300">Ocorrências Recentes</h3>
                        <div class="card-grid">
                            ${DB.complaints.map(c => `
                                <div class="glass p-5">
                                    <b class="text-lg text-white">${c.name || 'Anónimo'}</b>
                                    <p class="text-gray-400 text-sm mb-2">Tipo: <span class="text-yellow-200">${c.type}</span></p>
                                    <p class="text-gray-300 mb-2">${c.msg}</p>
                                    <p class="text-gray-500 text-sm">Localização: ${c.location}</p>
                                    <span class="inline-block mt-3 px-3 py-1 rounded-full text-xs font-semibold ${c.status === 'Recebido' ? 'bg-blue-600' : c.status === 'Em Análise' ? 'bg-orange-600' : 'bg-green-600'} text-white">Status: ${c.status || "Recebido"}</span>
                                </div>
                            `).join("")}
                        </div>
                    </div>
                </div>`;
        }

        function addComplaint() {
            let name = document.getElementById("rPhone").value;
            let type = document.getElementById("rType").value;
            let msg = document.getElementById("rMsg").value;
            let loc = document.getElementById("rLocation").value;

            if (!type || !msg || !loc) {
                alert("Por favor, preencha o Tipo de Problema, Descrição e Localização.");
                return;
            }
            DB.complaints.push({ name: name || 'Anónimo', type, msg, location: loc, status: "Recebido" });
            save();
            renderReport();
        }

        function renderClients() {
            content.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-4xl font-extrabold text-cyan-400 mb-6">Clientes / Utentes Registados</h2>
                    <p class="text-gray-400 mb-6">Visualize a lista de clientes e o seu estado atual.</p>
                    <div class="card-grid">
                        ${DB.clients.map(c => `
                            <div class="glass p-5">
                                <b class="text-xl text-white">${c.name}</b>
                                <p class="text-gray-400 text-sm mb-2">Tipo: <span class="text-cyan-200">${c.type}</span></p>
                                <p class="text-gray-300">Morada: ${c.address}</p>
                                <p class="text-gray-300">Telefone: ${c.phone}</p>
                                <p class="text-gray-300">Status: <span class="font-semibold ${c.status === 'Ativo' ? 'text-green-400' : 'text-red-400'}">${c.status}</span></p>
                                <p class="text-gray-300">Financeiro: <span class="font-semibold ${c.financial === 'Regular' ? 'text-green-400' : 'text-red-400'}">${c.financial}</span></p>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
        }

        function renderStaff() {
            content.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-4xl font-extrabold text-purple-400 mb-6">A Nossa Equipa de Excelência</h2>
                    <p class="text-gray-400 mb-6">Conheça os profissionais dedicados que fazem a diferença na UTGSL.</p>
                    <div class="card-grid">
                        ${DB.staff.map(s => `
                            <div class="glass p-5 flex flex-col items-center text-center">
                                <img src="${s.img}" alt="${s.name}" class="w-24 h-24 rounded-full object-cover mb-4 border-2 border-purple-500 shadow-lg">
                                <b class="text-xl text-white">${s.name}</b>
                                <p class="text-purple-300 font-semibold mb-3">${s.role}</p>
                                ${s.msg ? `<p class="text-gray-400 italic leading-relaxed">"${s.msg}"</p>` : ''}
                            </div>
                        `).join("")}
                    </div>
                </div>`;
        }

        function renderDashboard() {
            content.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-4xl font-extrabold text-green-400 mb-6">Dashboard de Operações</h2>
                    <p class="text-gray-400 mb-6">Visão geral e métricas importantes para a gestão.</p>
                    <div class="card-grid mb-8">
                        <div class="glass flex items-center gap-4">
                            <i class="fas fa-users text-4xl text-blue-400"></i>
                            <div>
                                <b class="text-gray-300">Total Clientes</b>
                                <p class="text-3xl font-bold text-white">${DB.clients.length}</p>
                            </div>
                        </div>
                        <div class="glass flex items-center gap-4">
                            <i class="fas fa-exclamation-triangle text-4xl text-yellow-400"></i>
                            <div>
                                <b class="text-gray-300">Ocorrências Abertas</b>
                                <p class="text-3xl font-bold text-white">${DB.complaints.filter(c => c.status !== 'Resolvido').length}</p>
                            </div>
                        </div>
                        <div class="glass flex items-center gap-4">
                            <i class="fas fa-comment-alt text-4xl text-pink-400"></i>
                            <div>
                                <b class="text-gray-300">Feedback Positivo</b>
                                <p class="text-3xl font-bold text-white">${DB.feedback.length}</p>
                            </div>
                        </div>
                    </div>
                    <div class="glass p-6">
                        <h3 class="text-2xl font-bold mb-4 text-green-300">Ocorrências por Dia (Última Semana)</h3>
                        <canvas id="chart"></canvas>
                    </div>
                </div>`;
            new Chart(document.getElementById("chart"), {
                type: "bar",
                data: {
                    labels: ["Seg", "Ter", "Qua", "Qui", "Sex", "Sáb", "Dom"],
                    datasets: [{
                        label: "Ocorrências",
                        data: [12, 19, 7, 15, 10, 5, 8],
                        backgroundColor: '#10b981',
                        borderColor: '#059669',
                        borderWidth: 1,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: { 
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: 'rgba(255,255,255,0.8)' }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: 'rgba(255,255,255,0.8)' }
                        }
                    }
                }
            });
        }

        function renderMap() {
            content.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-4xl font-extrabold text-blue-400 mb-6">Mapa de Ocorrências</h2>
                    <p class="text-gray-400 mb-6">Visualize a distribuição geográfica dos problemas reportados.</p>
                    <div id="map"></div>
                </div>`;
            const map = L.map('map').setView([-8.83, 13.23], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);
            [
                [-8.83, 13.23, "Centro - Fuga de Água"],
                [-8.90, 13.18, "Talatona - Lixo Acumulado"],
                [-8.84, 13.25, "Maianga - Entupimento de Esgoto"],
                [-8.80, 13.20, "Viana - Inundação"],
                [-8.86, 13.28, "Cazenga - Drenagem Bloqueada"]
            ].forEach(p => L.marker([p[0], p[1]]).addTo(map).bindPopup(p[2]));
        }

        function renderFeedback() {
            content.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-4xl font-extrabold text-pink-400 mb-6">Feedback dos Munícipes</h2>
                    <p class="text-gray-400 mb-6">A sua opinião é fundamental para a melhoria contínua dos nossos serviços.</p>
                    <div class="card-grid">
                        ${DB.feedback.map(f => `
                            <div class="glass p-5">
                                <b class="text-xl text-white">${f.name}</b>
                                <p class="text-gray-300 italic mt-2">"${f.msg}"</p>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
        }

        function renderNotifications() {
            content.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-4xl font-extrabold text-orange-400 mb-6">Notificações e Atualizações</h2>
                    <p class="text-gray-400 mb-6">Mantenha-se informado sobre as últimas novidades e alertas da UTGSL.</p>
                    <div class="space-y-4">
                        ${DB.notifications.map(n => `
                            <div class="glass p-5 flex items-center gap-4">
                                <i class="fas fa-info-circle text-3xl text-orange-400"></i>
                                <p class="text-gray-300">${n.msg}</p>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
        }

        // CHATBOT
        function sendMsg() {
            let v = chatInput.value.toLowerCase();
            if (!v) return;

            chatBox.innerHTML += `<div class="text-right text-blue-300 mb-1">Você: ${v}</div>`;
            chatInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            let r = "Desculpe, não entendi. Posso ajudar com informações sobre o dashboard, clientes, reclamações ou staff.";

            if (v.includes("olá") || v.includes("oi")) {
                r = "Olá! Como posso ajudar hoje?";
            } else if (v.includes("dashboard") || v.includes("métricas")) {
                r = "Para visualizar as métricas e o dashboard, por favor, clique na opção 'Dashboard Agente' no menu lateral.";
            } else if (v.includes("cliente") || v.includes("utentes")) {
                r = "A lista de clientes e utentes pode ser encontrada na secção 'Clientes'.";
            } else if (v.includes("reclama") || v.includes("problema") || v.includes("ocorrência")) {
                r = "Para reportar um problema ou ver as reclamações existentes, aceda à secção 'Reportar Problema'.";
            } else if (v.includes("staff") || v.includes("equipa")) {
                r = "Conheça a nossa equipa na secção 'Equipa / Staff'.";
            } else if (v.includes("mapa") || v.includes("localização")) {
                r = "O mapa de ocorrências está disponível na secção 'Mapa'.";
            } else if (v.includes("feedback") || v.includes("opinião")) {
                r = "Deixe o seu feedback na secção 'Feedback'. A sua opinião é muito importante para nós!";
            } else if (v.includes("notificaç")) {
                r = "As últimas notificações e atualizações estão na secção 'Notificações'.";
            }

            setTimeout(() => {
                chatBox.innerHTML += `<div class="text-green-400 mb-1">Assistente: ${r}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        }

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            nav('home', document.querySelector(".nav-btn"));
        });
    </script>
</body>
</html>
